<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ═══════════════════════════════════════════════════════════════
// GEOMETRIC STAIRCASE v2
// Merged: Claude's multi-mode comparison + Grok's sound & primes
// Bee × Claude × Grok, February 2026
// ═══════════════════════════════════════════════════════════════

const GRID = 96;
const CELL_PX = 110;

const RATIO_STEPS = [
  { n: 1,  d: 1,  label: "1/1",   name: "Unison",        type: "resonance",   color: "#FFD700" },
  { n: 9,  d: 8,  label: "9/8",   name: "Major 2nd",     type: "pythagorean", color: "#8899AA" },

  { n: 6,  d: 5,  label: "6/5",   name: "Minor 3rd",     type: "just",        color: "#66BBAA" },

  { n: 4,  d: 3,  label: "4/3",   name: "Perfect 4th",   type: "pythagorean", color: "#8899AA" },
  { n: 7,  d: 5,  label: "7/5",   name: "Blue ♭5",       type: "blue",        color: "#FF3366" },

  { n: 3,  d: 2,  label: "3/2",   name: "Perfect 5th",   type: "pythagorean", color: "#8899AA" },

  { n: 5,  d: 3,  label: "5/3",   name: "Major 6th",     type: "just",        color: "#66BBAA" },
  { n: 7,  d: 4,  label: "7/4",   name: "Blue ♭7",       type: "blue",        color: "#FF3366" },
  { n: 16, d: 9,  label: "16/9",  name: "Pyth m7",       type: "pythagorean", color: "#8899AA" },
  { n: 15, d: 8,  label: "15/8",  name: "Major 7th",     type: "just",        color: "#66BBAA" },
  { n: 2,  d: 1,  label: "2/1",   name: "Octave",        type: "resonance",   color: "#FFD700" },
  { n: 9,  d: 4,  label: "9/4",   name: "9th",           type: "pythagorean", color: "#8899AA" },
  { n: 18, d: 7,  label: "18/7",  name: "2× Blue ♭3",    type: "blue",        color: "#FF3366" },
  { n: 3,  d: 1,  label: "3/1",   name: "Tritave",       type: "resonance",   color: "#FFD700" },
];

RATIO_STEPS.forEach(s => { s.ratio = s.n / s.d; });

// ═══════════════════════════════════════════════════════════════
// GAP GEOMETRY — FRAMEWORK CONSTANTS (computed, not hardcoded)
// ═══════════════════════════════════════════════════════════════
const K_AUD_VAL = Math.SQRT2 * Math.LN2;          // 0.9802581434...
const G_GAP = 1 - K_AUD_VAL;                       // 0.0197418565...
const PHI_VAL = (1 + Math.sqrt(5)) / 2;            // 1.6180339887...
const FLOOR_VAL = 1 / PHI_VAL;                     // 0.6180339887...
const CORRIDOR_W = K_AUD_VAL - FLOOR_VAL;          // 0.3622241547...
const TOWER_LM = [
  { n:18, name:"√2/4 · Shell 3", col:"#FF6B35" },
  { n:32, name:"1/φ · Floor",     col:"#66BBAA" },
  { n:36, name:"1/√2",            col:"#8899AA" },
  { n:37, name:"Landauer",        col:"#d4a574" },
  { n:50, name:"K_AUD · Ceiling", col:"#FFD700" },
  { n:64, name:"√φ · Pivot",      col:"#FF3366" },
];

const MODES = [];
for (let m = 1; m <= 7; m++) {
  for (let nn = m; nn <= 7; nn++) {
    MODES.push({ m, n: nn, freq: m * m + nn * nn, label: `(${m},${nn})` });
  }
}
MODES.sort((a, b) => a.freq - b.freq);

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function isCoprime(m, n) { return gcd(m, n) === 1; }

function primeFactors(num) {
  if (num <= 1) return "1";
  let n = num;
  const factors = [];
  const sup = { 2: "²", 3: "³", 4: "⁴", 5: "⁵" };
  for (let i = 2; i * i <= n; i++) {
    let count = 0;
    while (n % i === 0) { n /= i; count++; }
    if (count > 0) factors.push(count > 1 ? `${i}${sup[count] || "^"+count}` : `${i}`);
  }
  if (n > 1) factors.push(`${n}`);
  return factors.join("·");
}

function primeLimit(step) {
  const allFactors = new Set();
  let n = step.n, d = step.d;
  for (let i = 2; i <= Math.max(n, d); i++) {
    while (n % i === 0) { allFactors.add(i); n /= i; }
    while (d % i === 0) { allFactors.add(i); d /= i; }
  }
  return Math.max(...allFactors, 1);
}

function computePattern(refM, refN, freqRatio, Q) {
  const targetFreq = (refM * refM + refN * refN) * freqRatio;
  const pixels = new Float32Array(GRID * GRID);
  let maxVal = 0;

  for (let mMode = 1; mMode <= 10; mMode++) {
    for (let nMode = 1; nMode <= 10; nMode++) {
      const modeFreq = mMode * mMode + nMode * nMode;
      const delta = (targetFreq - modeFreq) / modeFreq;
      const weight = 1.0 / (1.0 + (delta * Q) * (delta * Q));
      if (weight < 0.004) continue;

      for (let iy = 0; iy < GRID; iy++) {
        const y = (iy + 0.5) / GRID;
        const sinMY = Math.sin(Math.PI * mMode * y);
        const sinNY = Math.sin(Math.PI * nMode * y);
        for (let ix = 0; ix < GRID; ix++) {
          const x = (ix + 0.5) / GRID;
          const sinMX = Math.sin(Math.PI * mMode * x);
          const sinNX = Math.sin(Math.PI * nMode * x);
          pixels[iy * GRID + ix] += weight * (sinMX * sinNY + sinNX * sinMY);
        }
      }
    }
  }

  for (let i = 0; i < pixels.length; i++) {
    const v = Math.abs(pixels[i]);
    if (v > maxVal) maxVal = v;
  }
  return { pixels, maxVal };
}

function renderToCanvas(canvas, pixels, maxVal, scheme) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = GRID;
  canvas.height = GRID;
  const img = ctx.createImageData(GRID, GRID);

  for (let i = 0; i < pixels.length; i++) {
    const v = maxVal > 0 ? Math.pow(Math.abs(pixels[i]) / maxVal, 0.7) : 0;
    const idx = i * 4;

    if (scheme === "cyan") {
      img.data[idx] = Math.floor(v * 80);
      img.data[idx + 1] = Math.floor(v * 255);
      img.data[idx + 2] = Math.floor(100 + v * 155);
    } else {
      if (v < 0.25) {
        const s = v * 4;
        img.data[idx] = Math.floor(s * 80);
        img.data[idx + 1] = 0;
        img.data[idx + 2] = Math.floor(s * 120);
      } else if (v < 0.5) {
        const s = (v - 0.25) * 4;
        img.data[idx] = Math.floor(80 + s * 150);
        img.data[idx + 1] = Math.floor(s * 30);
        img.data[idx + 2] = Math.floor(120 - s * 80);
      } else if (v < 0.75) {
        const s = (v - 0.5) * 4;
        img.data[idx] = Math.floor(230 + s * 25);
        img.data[idx + 1] = Math.floor(30 + s * 120);
        img.data[idx + 2] = Math.floor(40 - s * 40);
      } else {
        const s = (v - 0.75) * 4;
        img.data[idx] = 255;
        img.data[idx + 1] = Math.floor(150 + s * 105);
        img.data[idx + 2] = Math.floor(s * 80);
      }
    }
    img.data[idx + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

function useSound() {
  const ctxRef = useRef(null);
  const activeRef = useRef([]);

  const getAudioCtx = useCallback(() => {
    if (!ctxRef.current) {
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctxRef.current.state === "suspended") ctxRef.current.resume();
    return ctxRef.current;
  }, []);

  const play = useCallback((freq, duration = 700) => {
    try {
      const ctx = getAudioCtx();
      activeRef.current.forEach(o => { try { o.stop(); } catch(e) {} });
      activeRef.current = [];

      const t = ctx.currentTime;
      const dur = duration / 1000;

      // Fundamental with soft attack (prevents click)
      const osc1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      osc1.type = "sine";
      osc1.frequency.setValueAtTime(freq, t);
      g1.gain.setValueAtTime(0.001, t);
      g1.gain.linearRampToValueAtTime(0.12, t + 0.015);
      g1.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc1.connect(g1); g1.connect(ctx.destination);
      osc1.start(t); osc1.stop(t + dur);

      // Gentle 2nd harmonic for warmth
      const osc2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      osc2.type = "sine";
      osc2.frequency.setValueAtTime(freq * 2, t);
      g2.gain.setValueAtTime(0.001, t);
      g2.gain.linearRampToValueAtTime(0.025, t + 0.015);
      g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.6);
      osc2.connect(g2); g2.connect(ctx.destination);
      osc2.start(t); osc2.stop(t + dur);

      activeRef.current = [osc1, osc2];
    } catch (e) {}
  }, [getAudioCtx]);

  const playSequence = useCallback((freqs, interval = 500) => {
    freqs.forEach((f, i) => {
      setTimeout(() => play(f, Math.min(interval + 200, 900)), i * interval);
    });
  }, [play]);

  const stop = useCallback(() => {
    activeRef.current.forEach(o => { try { o.stop(); } catch(e) {} });
    activeRef.current = [];
  }, []);

  return { play, playSequence, stop };
}

function PatternCell({ refM, refN, step, Q, scheme, size, isActive, onClick }) {
  const canvasRef = useRef(null);

  const pattern = useMemo(
    () => computePattern(refM, refN, step.ratio, Q),
    [refM, refN, step.ratio, Q]
  );

  useEffect(() => {
    renderToCanvas(canvasRef.current, pattern.pixels, pattern.maxVal, scheme);
  }, [pattern, scheme]);

  return (
    <div onClick={onClick} style={{
      display: "flex", flexDirection: "column", alignItems: "center",
      cursor: "pointer", transition: "transform 0.15s",
      transform: isActive ? "scale(1.06)" : "scale(1)",
    }}>
      <canvas ref={canvasRef} style={{
        width: size, height: size, borderRadius: 6,
        border: `2px solid ${isActive ? "#fff" : step.color + "50"}`,
        boxShadow: isActive ? `0 0 24px ${step.color}40` : "none",
      }} />
      <div className="mono" style={{
        marginTop: 4, fontSize: 11, color: step.color,
        fontWeight: step.type === "blue" || step.type === "resonance" ? 700 : 400,
      }}>
        {step.label}
      </div>
      <div className="mono" style={{ fontSize: 8.5, color: step.color + "99" }}>
        {step.name}
      </div>
    </div>
  );
}

function DetailView({ refM, refN, step, Q, scheme, soundEnabled, playSound }) {
  const canvasRef = useRef(null);

  const pattern = useMemo(
    () => computePattern(refM, refN, step.ratio, Q),
    [refM, refN, step.ratio, Q]
  );

  useEffect(() => {
    renderToCanvas(canvasRef.current, pattern.pixels, pattern.maxVal, scheme);
  }, [pattern, scheme]);

  const cop = isCoprime(refM, refN);
  const limit = primeLimit(step);
  const baseFreq = 110;
  const freq = baseFreq * (refM * refM + refN * refN) * step.ratio;

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <canvas ref={canvasRef} style={{
        width: 260, height: 260, borderRadius: 10,
        border: `3px solid ${step.color}`,
        boxShadow: `0 0 40px ${step.color}25`,
      }} />

      <div style={{ marginTop: 14, textAlign: "center" }}>
        <span className="mono" style={{ fontSize: 24, color: step.color, fontWeight: 700 }}>
          {step.label}
        </span>
        <span style={{ fontSize: 15, color: "#aab", marginLeft: 10 }}>{step.name}</span>
      </div>

      <div className="mono" style={{
        marginTop: 8, padding: "5px 14px", borderRadius: 8,
        background: "#111118", border: "1px solid #222", fontSize: 13, color: "#aab",
      }}>
        <span style={{ color: step.color }}>{primeFactors(step.n)}</span>
        <span style={{ color: "#556" }}> / </span>
        <span style={{ color: step.color + "bb" }}>{primeFactors(step.d)}</span>
        <span style={{ color: "#445", marginLeft: 10, fontSize: 10 }}>{limit}-limit</span>
      </div>

      <div style={{ fontSize: 11, color: "#667", marginTop: 6 }}>
        Mode ({refM},{refN}) × {step.ratio.toFixed(4)}
        {" · "}
        <span style={{ color: cop ? "#6b9" : "#f66" }}>
          {cop ? "coprime ✓" : refM === refN ? "m=n locked" : `GCD=${gcd(refM, refN)}`}
        </span>
      </div>

      <div style={{
        marginTop: 6, padding: "4px 14px", borderRadius: 14,
        fontSize: 11, fontWeight: 600,
        background: step.color + "15", color: step.color,
      }}>
        {step.type === "blue" ? "⬥ SEPTIMAL CORRIDOR" :
         step.type === "resonance" ? "◆ RESONANCE LANDING" :
         step.type === "septimal" ? "◇ 7-LIMIT" :
         step.type === "just" ? "○ 5-LIMIT (JUST)" :
         "□ 3-LIMIT (PYTHAGOREAN)"}
      </div>

      <button
        onClick={() => playSound(freq)}
        style={{
          marginTop: 10, padding: "6px 22px", borderRadius: 20,
          background: soundEnabled ? step.color : "#333",
          color: soundEnabled ? "#000" : "#666",
          border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700,
        }}
      >
        ♪ Play {freq.toFixed(0)} Hz
      </button>
    </div>
  );
}

function AnimatedSweep({ refM, refN, Q, scheme, soundEnabled, playSound }) {
  const canvasRef = useRef(null);
  const [sweepPos, setSweepPos] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const animRef = useRef(null);
  const startRef = useRef(null);
  const DURATION = 24000;

  const currentRatio = 1.0 + sweepPos * 2.0;

  const pattern = useMemo(
    () => computePattern(refM, refN, currentRatio, Q),
    [refM, refN, currentRatio, Q]
  );

  useEffect(() => {
    renderToCanvas(canvasRef.current, pattern.pixels, pattern.maxVal, scheme);
  }, [pattern, scheme]);

  const animate = useCallback((ts) => {
    if (!startRef.current) startRef.current = ts;
    const t = Math.min((ts - startRef.current) / DURATION, 1);
    setSweepPos(t);
    if (t < 1) animRef.current = requestAnimationFrame(animate);
    else setIsPlaying(false);
  }, []);

  const toggle = () => {
    if (isPlaying) {
      cancelAnimationFrame(animRef.current);
      setIsPlaying(false);
    } else {
      startRef.current = null;
      if (sweepPos >= 1) setSweepPos(0);
      setIsPlaying(true);
      animRef.current = requestAnimationFrame(animate);
    }
  };

  useEffect(() => () => { if (animRef.current) cancelAnimationFrame(animRef.current); }, []);

  const nearest = RATIO_STEPS.reduce((best, s) =>
    Math.abs(s.ratio - currentRatio) < Math.abs(best.ratio - currentRatio) ? s : best
  , RATIO_STEPS[0]);
  const isNear = Math.abs(nearest.ratio - currentRatio) < 0.025;

  return (
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center",
      background: "#0a0a14", borderRadius: 12, padding: 16,
      border: "1px solid #1a1a2a",
    }}>
      <div style={{ fontSize: 11, color: "#667", marginBottom: 8, fontWeight: 600, letterSpacing: 1 }}>
        CONTINUOUS SWEEP
      </div>
      <canvas ref={canvasRef} style={{
        width: 220, height: 220, borderRadius: 10,
        border: `2px solid ${isNear ? nearest.color : "#333"}`,
        boxShadow: isNear ? `0 0 24px ${nearest.color}25` : "none",
        transition: "border-color 0.2s, box-shadow 0.2s",
      }} />
      <div className="mono" style={{
        marginTop: 8, fontSize: 20, fontWeight: 700,
        color: isNear ? nearest.color : "#889",
      }}>
        ×{currentRatio.toFixed(3)}
        {isNear && (
          <span style={{ fontSize: 11, marginLeft: 8, opacity: 0.8 }}>
            ≈ {nearest.label} {nearest.name}
          </span>
        )}
      </div>

      <div style={{ width: "100%", position: "relative", marginTop: 10, paddingBottom: 18 }}>
        <input type="range" min="0" max="1" step="0.001" value={sweepPos}
          onChange={(e) => setSweepPos(parseFloat(e.target.value))}
          style={{ width: "100%", accentColor: "#FF3366" }}
        />
        <div style={{ position: "relative", width: "100%", height: 16, marginTop: -2 }}>
          {RATIO_STEPS.map((s, i) => {
            const pos = (s.ratio - 1.0) / 2.0;
            if (pos < 0 || pos > 1) return null;
            return (
              <div key={i} style={{
                position: "absolute", left: `${pos * 100}%`,
                transform: "translateX(-50%)",
                width: s.type === "blue" ? 3 : s.type === "resonance" ? 3 : 1,
                height: s.type === "blue" ? 12 : s.type === "resonance" ? 14 : 7,
                background: s.color, opacity: 0.6, borderRadius: 1,
              }} />
            );
          })}
        </div>
      </div>

      <button onClick={toggle} style={{
        padding: "7px 22px", borderRadius: 20,
        background: isPlaying ? "#FF336625" : "#FF3366",
        color: isPlaying ? "#FF3366" : "#fff",
        border: isPlaying ? "1px solid #FF3366" : "none",
        cursor: "pointer", fontSize: 12, fontWeight: 600,
      }}>
        {isPlaying ? "⏸ Pause" : sweepPos >= 1 ? "↺ Replay" : "▶ Sweep 1× → 3×"}
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// BINARY TOWER ON THE PLATE
// ═══════════════════════════════════════════════════════════════
function TowerPlates({ refM, refN, Q, scheme, soundEnabled, playSound, playSequence }) {
  const [sel, setSel] = useState(null);
  const thumbs = useRef([]);
  const detailRef = useRef(null);

  const data = useMemo(() => TOWER_LM.map(lm => {
    const nG = lm.n * G_GAP;
    const frac = nG - Math.floor(nG);
    const ratio = 1.0 + frac * 2.0;
    const freq = 110 * (refM * refM + refN * refN) * ratio;
    return { ...lm, nG, frac, ratio, freq };
  }), [refM, refN]);

  useEffect(() => {
    data.forEach((d, i) => {
      if (thumbs.current[i]) {
        const p = computePattern(refM, refN, d.ratio, Q);
        renderToCanvas(thumbs.current[i], p.pixels, p.maxVal, scheme);
      }
    });
  }, [data, Q, scheme, refM, refN]);

  useEffect(() => {
    if (sel !== null && detailRef.current) {
      const p = computePattern(refM, refN, data[sel].ratio, Q);
      renderToCanvas(detailRef.current, p.pixels, p.maxVal, scheme);
    }
  }, [sel, data, Q, scheme, refM, refN]);

  const handleClick = (i) => {
    setSel(i);
    if (soundEnabled) playSound(data[i].freq);
  };

  const handleSequence = () => {
    if (!soundEnabled) return;
    playSequence(data.map(d => d.freq), 600);
    data.forEach((_, i) => { setTimeout(() => setSel(i), i * 600); });
  };

  return (
    <div style={{
      background: "#0a0a14", borderRadius: 12, padding: 14,
      border: "1px solid #1a1a2a", marginBottom: 18,
    }}>
      <div style={{
        fontSize: 10, color: "#556", textAlign: "center", marginBottom: 4,
        textTransform: "uppercase", letterSpacing: 2,
      }}>
        Binary Tower on the Plate
      </div>
      <div style={{ fontSize: 11, color: "#667", textAlign: "center", marginBottom: 12 }}>
        Each landmark step n × G maps its fractional residual onto the plate — the tower's geometry made visible
      </div>

      <div style={{
        display: "flex", justifyContent: "center", gap: 10,
        flexWrap: "wrap", marginBottom: 14,
      }}>
        {data.map((d, i) => (
          <div key={i} onClick={() => handleClick(i)} style={{
            cursor: "pointer", textAlign: "center",
            transform: sel === i ? "scale(1.08)" : "scale(1)",
            transition: "transform 0.15s",
          }}>
            <canvas ref={el => thumbs.current[i] = el} style={{
              width: 96, height: 96, borderRadius: 6,
              border: `2px solid ${sel === i ? d.col : d.col + "30"}`,
              boxShadow: sel === i ? `0 0 16px ${d.col}30` : "none",
            }} />
            <div className="mono" style={{
              fontSize: 10, color: d.col, fontWeight: 700, marginTop: 3,
            }}>n={d.n}</div>
            <div style={{ fontSize: 8, color: "#556", maxWidth: 96 }}>{d.name}</div>
          </div>
        ))}
      </div>

      {sel !== null && (
        <div style={{
          display: "flex", justifyContent: "center", gap: 20,
          flexWrap: "wrap", alignItems: "center", marginBottom: 10,
        }}>
          <canvas ref={detailRef} style={{
            width: 200, height: 200, borderRadius: 10,
            border: `3px solid ${data[sel].col}`,
            boxShadow: `0 0 30px ${data[sel].col}20`,
          }} />

            <div className="mono" style={{ fontSize: 18, color: data[sel].col, fontWeight: 700 }}>

            <div style={{ fontSize: 12, color: "#889", marginTop: 4 }}>{data[sel].name}</div>
            <div className="mono" style={{
              fontSize: 11, color: "#667", marginTop: 8, lineHeight: 1.8,
            }}>

              frac = {data[sel].frac.toFixed(6)}<br />
              ratio = ×{data[sel].ratio.toFixed(4)}<br />
              freq = {data[sel].freq.toFixed(1)} Hz
            </div>
            <button onClick={() => playSound(data[sel].freq)} style={{
              marginTop: 8, padding: "5px 18px", borderRadius: 20,
              background: soundEnabled ? data[sel].col : "#333",
              color: soundEnabled ? "#000" : "#666",
              border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700,
            }}>
              ♪ {data[sel].freq.toFixed(0)} Hz

          </div>
        </div>
      )}

      <div style={{ textAlign: "center" }}>
        <button onClick={handleSequence} style={{
          padding: "7px 22px", borderRadius: 20,
          background: "#FFD70015", color: "#FFD700",
          border: "1px solid #FFD70040", cursor: "pointer",
          fontSize: 11, fontWeight: 600, letterSpacing: 0.5,
        }}>
          ▶ Play Tower Sequence
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// THE GAP — APPROACH AND SILENCE ON THE PLATE
// ═══════════════════════════════════════════════════════════════
function GapPlate({ refM, refN, Q, scheme, soundEnabled }) {
  const canvasRef = useRef(null);
  const [pos, setPos] = useState(0);
  const [playing, setPlaying] = useState(false);
  const animRef = useRef(null);
  const startRef = useRef(null);
  const audioRef = useRef(null);

  const kaudNorm = (K_AUD_VAL - FLOOR_VAL) / (1 - FLOOR_VAL);
  const inGap = pos > kaudNorm;
  const corridorVal = FLOOR_VAL + pos * (1 - FLOOR_VAL);
  const ratio = 1.0 + pos * 2.0;

  const pattern = useMemo(
    () => computePattern(refM, refN, ratio, Q),
    [refM, refN, ratio, Q]
  );

  useEffect(() => {
    if (!canvasRef.current) return;
    if (inGap) {
      const ctx2d = canvasRef.current.getContext("2d");
      canvasRef.current.width = GRID;
      canvasRef.current.height = GRID;
      const img = ctx2d.createImageData(GRID, GRID);
      for (let i = 0; i < GRID * GRID * 4; i += 4) {
        img.data[i] = 4; img.data[i+1] = 4; img.data[i+2] = 8;
        img.data[i+3] = 255;
      }
      ctx2d.putImageData(img, 0, 0);
    } else {
      renderToCanvas(canvasRef.current, pattern.pixels, pattern.maxVal, scheme);
    }
  }, [pattern, scheme, inGap]);

  const animate = useCallback((ts) => {
    if (!startRef.current) startRef.current = ts;
    const t = (ts - startRef.current) / 6000;
    if (t >= 1) { setPos(kaudNorm + 0.01); setPlaying(false); return; }
    const target = t * (kaudNorm + 0.02);
    setPos(Math.min(target, kaudNorm + 0.02));
    if (target <= kaudNorm + 0.02) {
      animRef.current = requestAnimationFrame(animate);
    } else {
      setPlaying(false);
    }
  }, [kaudNorm]);

  const toggle = () => {
    if (playing) {
      cancelAnimationFrame(animRef.current);
      setPlaying(false);
      if (audioRef.current) {
        try {
          audioRef.current.g.gain.exponentialRampToValueAtTime(
            0.001, audioRef.current.ctx.currentTime + 0.2
          );
        } catch(e) {}
      }
    } else {
      startRef.current = null;
      setPos(0);
      setPlaying(true);
      animRef.current = requestAnimationFrame(animate);
      if (soundEnabled) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = "sine";
          const baseF = 110 * (refM * refM + refN * refN);
          osc.frequency.setValueAtTime(baseF, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(
            baseF * (1.0 + kaudNorm * 2.0), ctx.currentTime + 5.5
          );
          g.gain.setValueAtTime(0.001, ctx.currentTime);
          g.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
          g.gain.setValueAtTime(0.1, ctx.currentTime + 5.2);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 5.7);
          osc.connect(g); g.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 6);
          audioRef.current = { ctx, osc, g };
        } catch(e) {}
      }
    }
  };

  useEffect(() => () => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
  }, []);

  return (
    <div style={{
      background: "#0a0a14", borderRadius: 12, padding: 18,
      border: "1px solid #1a1a2a", marginBottom: 18,
    }}>
      <div style={{
        fontSize: 10, color: "#556", textAlign: "center", marginBottom: 4,
        textTransform: "uppercase", letterSpacing: 2,
      }}>
        The Gap — Approach and Silence
      </div>
      <div style={{ fontSize: 11, color: "#667", textAlign: "center", marginBottom: 14 }}>
        The plate sweeps from floor (1/φ) toward unity. At K<sub>AUD</sub> the tone stops. The last 2% is dark.
      </div>

      <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
        <canvas ref={canvasRef} style={{
          width: 240, height: 240, borderRadius: 10,
          border: `2px solid ${inGap ? "#1a1a2a" : "#d4a57450"}`,
          boxShadow: inGap ? "none" : "0 0 30px #d4a57415",
          transition: "border-color 0.3s, box-shadow 0.3s",
        }} />

        <div className="mono" style={{
          marginTop: 10, fontSize: 15, fontWeight: 700,
          color: inGap ? "#2a2a3a" : "#d4a574",
          transition: "color 0.3s",
        }}>
          {inGap ? "the gap — silence" : corridorVal.toFixed(6)}
        </div>

        <div style={{ width: "80%", maxWidth: 360, marginTop: 10, position: "relative" }}>
          <input type="range" min="0" max="1" step="0.002" value={pos}
            onChange={e => { if (!playing) setPos(parseFloat(e.target.value)); }}
            style={{ width: "100%", accentColor: "#d4a574" }}
          />
          <div style={{
            position: "absolute", top: -4,
            left: `${kaudNorm * 100}%`, transform: "translateX(-50%)",
            width: 2, height: 22, background: "#FFD700", opacity: 0.5,
            borderRadius: 1, pointerEvents: "none",
          }} />
          <div style={{
            display: "flex", justifyContent: "space-between",
            fontSize: 9, color: "#445", marginTop: 2,
          }}>
            <span>1/φ = {FLOOR_VAL.toFixed(4)}</span>
            <span style={{ color: inGap ? "#d4a574" : "#445" }}>
              K<sub>AUD</sub> = {K_AUD_VAL.toFixed(4)}
            </span>
            <span>1.000</span>
          </div>
        </div>

        <button onClick={toggle} style={{
          marginTop: 12, padding: "8px 24px", borderRadius: 20,
          background: playing ? "#d4a57420" : "#d4a574",
          color: playing ? "#d4a574" : "#000",
          border: playing ? "1px solid #d4a574" : "none",
          cursor: "pointer", fontSize: 12, fontWeight: 600,
        }}>
          {playing ? "Pause" : pos > 0 ? "Restart" : "Approach the ceiling"}
        </button>
      </div>
    </div>
  );
}
