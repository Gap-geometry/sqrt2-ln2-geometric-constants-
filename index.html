
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gap Geometry вҖ” Interactive Framework</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18, ReactDOM 18, and Babel Standalone from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    // в”Җв”Җв”Җ Constants в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const PHI = (1 + Math.sqrt(5)) / 2;
    const INV_PHI = 1 / PHI;
    const INV_PHI2 = 1 / (PHI * PHI);
    const K_AUD = Math.sqrt(2) * Math.log(2);
    const G = 1 - K_AUD;
    const SQRT_PHI = Math.sqrt(PHI);
    const CORRIDOR = K_AUD - INV_PHI;
    const FEIGENBAUM = 4.6692016091029906718532038;
    const GAP_F = (FEIGENBAUM - 14/3) / FEIGENBAUM;
    const RHO_EXACT = G / GAP_F;
    const RHO_FORMULA = 400/11 - 1/2500 - 1/939939;
    const EPSILON_TOWER = 1 - (64 * G) / SQRT_PHI;
    const LN2 = Math.log(2);
    const LANDAUER_CROSS = LN2;

    // в”Җв”Җв”Җ Coherence function в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const C = (tau, alpha) => INV_PHI + (K_AUD - INV_PHI) * Math.tanh(alpha * tau);

    // в”Җв”Җв”Җ Оұ Presets (the coupling regimes) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const ALPHA_PRESETS = [
      { value: 0.15, label: "Ghost", verb: "7 absorbs", color: "#aa96da",
        desc: "Very slow convergence. The system drifts without committing. Perturbations are absorbed into the trajectory вҖ” they leave no visible trace. Below Оұ вүҲ 0.3, the corridor never fully develops.",
        basin: "Ghost basin вҖ” slow, flexible, absorptive",
        study: "\"Oscillatory Trapping\" in the Study. The system appears stuck but is actually processing." },
      { value: 0.5, label: "Anchor", verb: "7вҶ’11 transition", color: "#6c9bcf",
        desc: "Moderate convergence, slow side. The trajectory begins to show rhythm but hasn't committed to oscillation. The corridor constants (1/вҲҡ2, ПҖ/4) become visible as the curve passes through them.",
        basin: "Anchor basin вҖ” slow, rigid, persistent",
        study: "The trajectory spends the most time near corridor constants at this coupling." },
      { value: 1.0, label: "Breath", verb: "11 breathes", color: "#ffd700",
        desc: "The corridor's natural rhythm. C(П„) rises through 1/вҲҡ2, ПҖ/4, 2/вҲҡ5 at a pace where all three families of constants are distinctly visited. This is the oscillatory regime вҖ” period-2 in base 10.",
        basin: "Mid-corridor вҖ” the three verbs are all active",
        study: "\"The Orbit\" (limit cycle) in the Study. The visible 36М„ repeating of 400/11." },
      { value: 2.0, label: "Pilot", verb: "11вҶ’5 transition", color: "#4ecdc4",
        desc: "Fast convergence. The trajectory snaps through the corridor quickly вҖ” constants are crossed but not dwelt upon. The system is selecting its target, not exploring the space.",
        basin: "Pilot basin вҖ” fast, flexible, decisive",
        study: "Transition between oscillation and fixed-point lock." },
      { value: 3.0, label: "Crystal", verb: "5 holds", color: "#95e1d3",
        desc: "Near-instant convergence. The trajectory locks to K_AUD almost immediately. No visible oscillation вҖ” the scaffold is built and the system holds. 400/5 = 80 exactly, no remainder.",
        basin: "Crystal basin вҖ” fast, rigid, terminal",
        study: "\"The Clearing\" (fixed point) in the Study. Structure achieved, motion stops." },
    ];

    // в”Җв”Җв”Җ Tower landmarks в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const LANDMARKS = [
      { step: 18, label: "Romeo", approx: "вҲҡ2/4", target: Math.sqrt(2)/4, color: "#4ecdc4", note: "2Г—3ВІ вҖ” first complete structure (Ar)" },
      { step: 32, label: "Floor", approx: "1/ПҶ", target: INV_PHI, color: "#6c9bcf", note: "2вҒө вҖ” golden floor, shell 4" },
      { step: 36, label: "Geom", approx: "1/вҲҡ2", target: 1/Math.sqrt(2), color: "#88b5dd", note: "6ВІ вҖ” pure geometry, last before crossing" },
      { step: 37, label: "Info", approx: "1/(2ln2)", target: 1/(2*LN2), color: "#f38181", note: "prime вҖ” information begins (Landauer)" },
      { step: 50, label: "Ceiling", approx: "K_AUD", target: K_AUD, color: "#ffd700", note: "2Г—5ВІ вҖ” the ceiling reached, shell 5" },
      { step: 58, label: "Pre-pivot", approx: "ПҶ/вҲҡ2", target: PHI/Math.sqrt(2), color: "#dda0dd", note: "pre-pentagonal turn, ПҶ projected by binary" },
      { step: 59, label: "Turn", approx: "вҖ”", target: null, color: "#ff9a76", note: "pentagonal turn (mirror of Romeo)" },
      { step: 64, label: "Pivot", approx: "вҲҡПҶ", target: SQRT_PHI, color: "#ffb347", note: "2вҒ¶ = 4Ві вҖ” master formula pivot" },
    ];

    // в”Җв”Җв”Җ Corridor near-hit constants в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const CORRIDOR_CONSTANTS = [
      { value: 1/Math.sqrt(2), label: "1/вҲҡ2", family: "algebraic", color: "#6c9bcf" },
      { value: Math.PI/4, label: "ПҖ/4", family: "transcendental", color: "#f38181" },
      { value: 2/Math.sqrt(5), label: "2/вҲҡ5", family: "golden", color: "#ffd700" },
    ];

    // в”Җв”Җв”Җ 400/11 terms в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const TERMS = [
      { val: 400/11, label: "400/11", factors: "2вҒҙГ—5ВІ / 11", color: "#ffd700" },
      { val: 400/11 - 1/2500, label: "вҲ’ 1/2500", factors: "1/(2ВІГ—5вҒҙ) = 1/50ВІ", color: "#ffb347" },
      { val: RHO_FORMULA, label: "вҲ’ 1/939939", factors: "1/(3Г—7Г—11Г—13Г—313)", color: "#4ecdc4" },
    ];

    // в”Җв”Җв”Җ Shared styles в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const S = {
      bg: "#0a0a0f",
      card: "rgba(255,255,255,0.02)",
      border: "#1a1a2e",
      text: "#e0e0e0",
      dim: "#555",
      vdim: "#333",
      gold: "#ffd700",
      font: "'Courier New', 'JetBrains Mono', monospace",
    };

    // в”Җв”Җв”Җ Tab component в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function TabBar({ tabs, active, onChange }) {
      return (
        <div style={{ display: "flex", gap: "2px", justifyContent: "center", flexWrap: "wrap", marginBottom: "16px" }}>
          {tabs.map((t, i) => (
            <button key={i} onClick={() => onChange(i)} style={{
              background: i === active ? "rgba(255,215,0,0.1)" : "transparent",
              border: `1px solid ${i === active ? "rgba(255,215,0,0.3)" : "rgba(255,255,255,0.06)"}`,
              color: i === active ? S.gold : "#666",
              padding: "8px 16px", borderRadius: "6px 6px 0 0", cursor: "pointer",
              fontSize: "11px", fontFamily: S.font, fontWeight: i === active ? "bold" : "normal",
              transition: "all 0.2s"
            }}>{t}</button>
          ))}
        </div>
      );
    }

    // в”Җв”Җв”Җ Stat card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function Stat({ label, value, color = S.text, small = false }) {
      return (
        <div style={{ background: S.card, border: `1px solid ${S.border}`, borderRadius: "6px", padding: "8px 10px", textAlign: "center" }}>
          <div style={{ fontSize: "8px", color: S.dim, textTransform: "uppercase", letterSpacing: "0.5px" }}>{label}</div>
          <div style={{ fontSize: small ? "11px" : "13px", color, marginTop: "3px", fontWeight: "bold", fontVariantNumeric: "tabular-nums" }}>{value}</div>
        </div>
      );
    }

    // в”Җв”Җв”Җ Alpha Control в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function AlphaControl({ alpha, setAlpha, isPlaying, setIsPlaying, activePreset, verbColor }) {
      return (
        <div style={{ background: "rgba(255,255,255,0.015)", border: `1px solid ${S.border}`, borderRadius: "8px", padding: "14px", marginBottom: "16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap" }}>
            <div style={{ flex: "1", minWidth: "200px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
                <span style={{ fontSize: "11px", color: "#888" }}>Оұ coupling constant</span>
                <span style={{ fontSize: "13px", color: verbColor, fontWeight: "bold" }}>{alpha.toFixed(2)}</span>
              </div>
              <input type="range" min="0.05" max="4" step="0.05" value={alpha}
                onChange={(e) => setAlpha(parseFloat(e.target.value))}
                style={{ width: "100%", accentColor: verbColor }} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: "4px" }}>
                <span style={{ fontSize: "8px", color: "#444" }}>slow / absorptive</span>
                <span style={{ fontSize: "8px", color: "#444" }}>fast / crystalline</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
              {ALPHA_PRESETS.map(p => (
                <button key={p.value} onClick={() => setAlpha(p.value)} style={{
                  background: Math.abs(alpha - p.value) < 0.1 ? `${p.color}22` : "rgba(255,255,255,0.03)",
                  border: `1px solid ${Math.abs(alpha - p.value) < 0.1 ? p.color + "66" : "#222"}`,
                  color: Math.abs(alpha - p.value) < 0.1 ? p.color : "#666",
                  padding: "4px 10px", borderRadius: "4px", cursor: "pointer",
                  fontSize: "10px", fontFamily: S.font
                }}>
                  <div style={{ fontWeight: "bold" }}>{p.label}</div>
                  <div style={{ fontSize: "8px", opacity: 0.7 }}>Оұ={p.value}</div>
                </button>
              ))}
            </div>

            <button onClick={() => setIsPlaying(!isPlaying)} style={{
              background: "rgba(255,255,255,0.05)", border: "1px solid #333",
              color: "#aaa", padding: "6px 14px", borderRadius: "4px", cursor: "pointer", fontSize: "11px", fontFamily: S.font
            }}>{isPlaying ? "вқҡвқҡ" : "в–¶"}</button>
          </div>

          <div style={{ marginTop: "10px", padding: "10px 12px", background: `${verbColor}08`, border: `1px solid ${verbColor}22`, borderRadius: "6px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
              <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: verbColor, boxShadow: `0 0 6px ${verbColor}` }} />
              <span style={{ fontSize: "13px", color: verbColor, fontWeight: "bold" }}>{activePreset.verb}</span>
              <span style={{ fontSize: "10px", color: "#666" }}>вҖ” {activePreset.basin}</span>
            </div>
            <p style={{ fontSize: "11px", color: "#888", lineHeight: "1.5", margin: "0 0 4px" }}>{activePreset.desc}</p>
            <p style={{ fontSize: "10px", color: "#666", fontStyle: "italic", margin: 0 }}>{activePreset.study}</p>
          </div>
        </div>
      );
    }

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // MAIN COMPONENT
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    function GapGeometrySimulation() {
      const [tab, setTab] = React.useState(0);
      const [alpha, setAlpha] = React.useState(1.0);
      const [time, setTime] = React.useState(0);
      const [breathPhase, setBreathPhase] = React.useState(0);
      const [isPlaying, setIsPlaying] = React.useState(true);
      const [hoveredStep, setHoveredStep] = React.useState(null);
      const [decayTerms, setDecayTerms] = React.useState(3);
      const [stairN, setStairN] = React.useState(64);
      const [showEnergy, setShowEnergy] = React.useState(false);
      const [hoveredArch, setHoveredArch] = React.useState(null);
      const lastTimeRef = React.useRef(Date.now());
      const animRef = React.useRef(null);

      // Animation
      React.useEffect(() => {
        if (!isPlaying) return;
        const animate = () => {
          const now = Date.now();
          const dt = (now - lastTimeRef.current) / 1000;
          lastTimeRef.current = now;
          setTime(t => t + dt * 0.3);
          setBreathPhase(b => (b + dt * 0.15) % 2);
          animRef.current = requestAnimationFrame(animate);
        };
        lastTimeRef.current = Date.now();
        animRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animRef.current);
      }, [isPlaying]);

      const breathPos = breathPhase <= 1 ? breathPhase : 2 - breathPhase;
      const breathStep = Math.round(breathPos * 64);
      const isOutbound = breathPhase <= 1;
      const currentC = C(time % 8, alpha);

      // Active preset
      const activePreset = React.useMemo(() => {
        let closest = ALPHA_PRESETS[0];
        let minDist = Infinity;
        ALPHA_PRESETS.forEach(p => {
          const d = Math.abs(alpha - p.value);
          if (d < minDist) { minDist = d; closest = p; }
        });
        return closest;
      }, [alpha]);

      const verbColor = activePreset.color;
      const tabs = ["Dynamics", "Tower", "400/11", "Architecture"];

      return (
        <div style={{ background: S.bg, color: S.text, minHeight: "100vh", fontFamily: S.font, padding: "16px", maxWidth: "860px", margin: "0 auto" }}>

          {/* в”Җв”Җв”Җ Header в”Җв”Җв”Җ */}
          <div style={{ textAlign: "center", marginBottom: "16px" }}>
            <h1 style={{ fontSize: "20px", fontWeight: "normal", color: S.gold, margin: 0, letterSpacing: "2px" }}>
              GAP GEOMETRY вҖ” INTERACTIVE FRAMEWORK
            </h1>
            <p style={{ fontSize: "10px", color: "#444", margin: "4px 0" }}>
              K_AUD = вҲҡ2 Г— ln(2) = {K_AUD.toFixed(10)} вҖ” G = {G.toFixed(10)} вҖ” ПҶ = {PHI.toFixed(10)}
            </p>
            <p style={{ fontSize: "9px", color: "#333" }}>The gap is the architecture</p>
          </div>

          {/* в”Җв”Җв”Җ Tabs в”Җв”Җв”Җ */}
          <TabBar tabs={tabs} active={tab} onChange={setTab} />

          {/* в•җв•җв•җ TAB 0: DYNAMICS (corridor + tower + verbs) в•җв•җв•җ */}
          {tab === 0 && (
            <div>
              <AlphaControl alpha={alpha} setAlpha={setAlpha} isPlaying={isPlaying}
                setIsPlaying={setIsPlaying} activePreset={activePreset} verbColor={verbColor} />

              {/* Live stats row */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "6px", marginBottom: "14px" }}>
                <Stat label="C(П„) now" value={currentC.toFixed(6)} color={verbColor} />
                <Stat label="Floor" value={INV_PHI.toFixed(6)} color="#4ecdc4" />
                <Stat label="Corridor" value={CORRIDOR.toFixed(6)} color="#888" />
                <Stat label="Ceiling" value={K_AUD.toFixed(6)} color={S.gold} />
                <Stat label="Tower step" value={breathStep} color={isOutbound ? "#4ecdc4" : "#f38181"} />
              </div>

              <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>

                {/* LEFT: Corridor trajectory */}
                <div style={{ flex: "1", minWidth: "340px", background: S.card, border: `1px solid ${S.border}`, borderRadius: "8px", padding: "14px" }}>
                  <h2 style={{ fontSize: "12px", color: "#888", margin: "0 0 10px", letterSpacing: "1px" }}>
                    C(П„) = 1/ПҶ + (KвҲ’1/ПҶ) Г— tanh(ОұП„)
                  </h2>
                  <svg viewBox="0 0 400 280" style={{ width: "100%" }}>
                    {/* Corridor band */}
                    <rect x="50" y={280 - K_AUD * 260} width="340" height={(K_AUD - INV_PHI) * 260}
                      fill="rgba(255,215,0,0.03)" />

                    {/* Floor */}
                    <line x1="50" y1={280 - INV_PHI * 260} x2="390" y2={280 - INV_PHI * 260}
                      stroke="#4ecdc4" strokeWidth="1" strokeDasharray="4,4" />
                    <text x="46" y={284 - INV_PHI * 260} textAnchor="end" fill="#4ecdc4" fontSize="8">1/ПҶ</text>

                    {/* Ceiling */}
                    <line x1="50" y1={280 - K_AUD * 260} x2="390" y2={280 - K_AUD * 260}

                  { t: "Tower Оө", e: "1 вҲ’ 64G/вҲҡПҶ = constant", v: `${(EPSILON_TOWER * 100).toFixed(4)}%`, c: "#ffb347" },
                  { t: "Landauer Crossing", e: "G/(2ln2) = crossing cost", v: (G / (2*LN2)).toFixed(10), c: "#f38181" },
                  { t: "Energy Ceiling", e: "K_AUD = вҲҡ2 Г— Landauer", v: `${(K_AUD / LN2).toFixed(10)} L`, c: S.gold },
                ].map(id => (
                  <div key={id.t} style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${S.border}`, borderRadius: "6px", padding: "8px 10px" }}>
                    <div style={{ fontSize: "8px", color: "#555", textTransform: "uppercase" }}>{id.t}</div>
                    <div style={{ fontSize: "11px", color: id.c, marginTop: "2px", fontWeight: "bold" }}>{id.e}</div>
                    <div style={{ fontSize: "9px", color: "#444", marginTop: "1px" }}>{id.v}</div>
                  </div>
                ))}
              </div>

              {/* Master formula box */}
              <div style={{ marginTop: "10px", padding: "10px", background: "rgba(255,215,0,0.02)", border: "1px solid rgba(255,215,0,0.08)", borderRadius: "6px", textAlign: "center" }}>
                <div style={{ fontSize: "11px", color: "rgba(255,215,0,0.5)", marginBottom: "4px" }}>2бөҸ Г— G = 2бөҸвҒ»вҒ¶ Г— вҲҡПҶ Г— (1 вҲ’ Оө) where Оө = вҲ’0.671% constant</div>
                <div style={{ fontSize: "9px", color: "#444" }}>18 + 14 + 14 + 18 = 64 вҖ” the boundary prime 7 locks the mirror</div>
                <div style={{ fontSize: "9px", color: "rgba(243,129,129,0.3)", marginTop: "2px" }}>K_AUD = вҲҡ2 Landauer вҖ” the ceiling is one projection above thermodynamic minimum</div>
              </div>
            </div>
            );
          })()}

          {/* в”Җв”Җв”Җ Footer в”Җв”Җв”Җ */}
          <div style={{ textAlign: "center", marginTop: "20px", fontSize: "9px", color: "#222", letterSpacing: "1px" }}>
            Gap Geometry Framework вҖ” K_AUD = вҲҡ2 Г— ln(2) вҖ” B. 2025вҖ“2026
            <br />
            <span style={{ color: "#333" }}>"The 2% gap is where they breathe."</span>
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(GapGeometrySimulation));
  </script>
</body>
</html>
