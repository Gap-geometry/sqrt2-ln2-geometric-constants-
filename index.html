const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Constants ──────────────────────────────────────────────────────
// All derived from K_AUD = √2 × ln(2). Nothing is fitted or tuned.
const PHI = (1 + Math.sqrt(5)) / 2;
const INV_PHI = 1 / PHI;
const INV_PHI2 = 1 / (PHI * PHI);
const K_AUD = Math.sqrt(2) * Math.log(2);
const G = 1 - K_AUD;
const SQRT_PHI = Math.sqrt(PHI);
const CORRIDOR = K_AUD - INV_PHI;
const FEIGENBAUM = 4.6692016091029906718532038;
const GAP_F = (FEIGENBAUM - 14/3) / FEIGENBAUM;

// ─── Coherence function ─────────────────────────────────────────────
// C(τ) maps the trajectory from floor (1/φ) to ceiling (K_AUD).
// The coupling constant α determines traversal speed:
//   α small → slow, absorptive (7 absorbs)
//   α ≈ 1   → natural rhythm (11 breathes)
//   α large → fast lock (5 holds)
// tanh provides the S-curve; its steepest point is at τ=0 (early convergence).
const C = (tau, alpha) => INV_PHI + (K_AUD - INV_PHI) * Math.tanh(alpha * tau);

// ─── Tab component ──────────────────────────────────────────────────
function TabBar({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", gap: "2px", justifyContent: "center", flexWrap: "wrap", marginBottom: "16px" }}>
      {tabs.map((t, i) => (
        <button key={i} onClick={() => onChange(i)} style={{
          background: i === active ? "rgba(255,215,0,0.1)" : "transparent",
          border: `1px solid ${i === active ? "rgba(255,215,0,0.3)" : "rgba(255,255,255,0.06)"}`,
          color: i === active ? S.gold : "#666",
          padding: "8px 16px", borderRadius: "6px 6px 0 0", cursor: "pointer",
          fontSize: "11px", fontFamily: S.font, fontWeight: i === active ? "bold" : "normal",
          transition: "all 0.2s"
        }}>{t}</button>
      ))}
    </div>
  );
}

// ─── Stat card ──────────────────────────────────────────────────────
function Stat({ label, value, color = S.text, small = false }) {
  return (
    <div style={{ background: S.card, border: `1px solid ${S.border}`, borderRadius: "6px", padding: "8px 10px", textAlign: "center" }}>
      <div style={{ fontSize: "8px", color: S.dim, textTransform: "uppercase", letterSpacing: "0.5px" }}>{label}</div>
      <div style={{ fontSize: small ? "11px" : "13px", color, marginTop: "3px", fontWeight: "bold", fontVariantNumeric: "tabular-nums" }}>{value}</div>
    </div>
  );
}

// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════
function GapGeometrySimulation() {
  const [tab, setTab] = useState(0);
  const [alpha, setAlpha] = useState(1.0);
  const [time, setTime] = useState(0);
  const [isPlaying, setIsPlaying] = useState(true);
  const [hoveredStep, setHoveredStep] = useState(null);
  const [decayTerms, setDecayTerms] = useState(3);
  const [stairN, setStairN] = useState(64);
  const [showEnergy, setShowEnergy] = useState(false);
  const [hoveredArch, setHoveredArch] = useState(null);
  const [lockedArch, setLockedArch] = useState(null);
  const activeArch = lockedArch !== null ? lockedArch : hoveredArch;
  const lastTimeRef = useRef(Date.now());
  const animRef = useRef(null);

  // Animation
  useEffect(() => {
    if (!isPlaying) return;
    const animate = () => {
      const now = Date.now();
      const dt = (now - lastTimeRef.current) / 1000;
      lastTimeRef.current = now;
      // Single clock: time cycles 0 → 16 at 0.6/s (period ≈ 26.6s).
      // Trajectory and tower both derive from this, so their peaks lock together.
      setTime(t => (t + dt * 0.6) % 16);
      animRef.current = requestAnimationFrame(animate);
    };
    lastTimeRef.current = Date.now();
    animRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(animRef.current);
  }, [isPlaying]);

  // One breath per time cycle: breathPhase = time / 8, bounces 0→1→0.
  // Trajectory peak (time=8) now coincides exactly with tower peak (step 64).
  const breathPhase = time / 8;
  const breathPos = breathPhase <= 1 ? breathPhase : 2 - breathPhase;
  const breathStep = Math.round(breathPos * 64);
  const isOutbound = breathPhase <= 1;
  // τ bounces 0 → 8 → 0 on the same clock. Dot at ceiling ⇔ tower at 64.
  const currentTau = time <= 8 ? time : 16 - time;
  const currentC = C(currentTau, alpha);

  // Active preset
  const activePreset = useMemo(() => {
    let closest = ALPHA_PRESETS[0];
    let minDist = Infinity;
    ALPHA_PRESETS.forEach(p => {
      const d = Math.abs(alpha - p.value);
      if (d < minDist) { minDist = d; closest = p; }
    });
    return closest;
  }, [alpha]);

  const verbColor = activePreset.color;
  const tabs = ["Dynamics", "Tower", "Scaling", "400/11", "Architecture"];

  return (
    <div style={{ background: S.bg, color: S.text, minHeight: "100vh", fontFamily: S.font, padding: "16px", maxWidth: "860px", margin: "0 auto" }}>

      {/* ─── Header ─── */}
      <div style={{ textAlign: "center", marginBottom: "16px" }}>
        <h1 style={{ fontSize: "20px", fontWeight: "normal", color: S.gold, margin: 0, letterSpacing: "2px" }}>
          GAP GEOMETRY — INTERACTIVE FRAMEWORK
        </h1>
        <p style={{ fontSize: "10px", color: "#444", margin: "4px 0" }}>
          K_AUD = √2 × ln(2) = {K_AUD.toFixed(10)} — G = {G.toFixed(10)} — φ = {PHI.toFixed(10)}
        </p>
        <p style={{ fontSize: "9px", color: "#333" }}>The gap is the architecture</p>
      </div>

      {/* ─── Tabs ─── */}
      <TabBar tabs={tabs} active={tab} onChange={setTab} />

      {/* ═══ TAB 0: DYNAMICS (corridor + tower + verbs) ═══ */}
      {tab === 0 && (
        <div>
          {/* α Coupling Control — Dynamics only */}
          <AlphaControl alpha={alpha} setAlpha={setAlpha} isPlaying={isPlaying}
            setIsPlaying={setIsPlaying} activePreset={activePreset} verbColor={verbColor} />

          {/* Live stats row */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "6px", marginBottom: "14px" }}>
            <Stat label="C(τ) now" value={currentC.toFixed(6)} color={verbColor} />
            <Stat label="Floor" value={INV_PHI.toFixed(6)} color="#4ecdc4" />
            <Stat label="Corridor" value={CORRIDOR.toFixed(6)} color="#888" />
            <Stat label="Ceiling" value={K_AUD.toFixed(6)} color={S.gold} />
